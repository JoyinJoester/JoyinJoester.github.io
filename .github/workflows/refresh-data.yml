name: Refresh GitHub Data

on:
  schedule:
    # 每 30 分钟刷新一次 (UTC 时间,北京时间 -8h)
    - cron: '17,47 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/fetch-github.mjs'
      - '.github/workflows/refresh-data.yml'

permissions:
  contents: write

concurrency:
  group: refresh-github-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-github.mjs

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes — data unchanged."
          else
            git commit -m "chore(data): refresh GitHub data

            Generated by .github/workflows/refresh-data.yml
            [skip ci]"
            git push
            echo "Pushed updated data."
          fi
